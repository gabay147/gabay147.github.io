<canvas id="c">

</canvas>

<script type="module">
    import * as THREE from './External/three.js/build/three.module.js';

    function main() {
        const scene = new THREE.Scene();
        
        //Box setup
        const boxWidth = 1;
        const boxHeight = 1;
        const boxDepth = 1;
        const geometry = new THREE.BoxGeometry(boxWidth, boxHeight, boxDepth);
        const material = new THREE.MeshBasicMaterial({color: 0x44aa88});
        material.transparent = true;
        material.opacity = 0.3;
        const cube = new THREE.Mesh(geometry, material);
        scene.add(cube);

        //TextLoader
        const textArray = [
            "About",
            "Twitter",
            "Portfolio",
            "Resume",
            "Instagram",
            "Youtube"
        ]
        const position = [
            [0,0,0.5],
            [0,0,-0.5],
            [0,0.5,0],
            [0,-0.5,0],
            [0.5,0,0],
            [-0.5,0,0]
        ]
        const emptyObj = [
            new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.1, 0.1)),
            new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.1, 0.1)),
            new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.1, 0.1)),
            new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.1, 0.1)),
            new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.1, 0.1)),
            new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.1, 0.1)),
        ]
        const textMeshArray = [];

        for (let i = 0; i < textArray.length; i++) {
            emptyObj[i].position.x = position[i][0];
            emptyObj[i].position.y = position[i][1];
            emptyObj[i].position.z = position[i][2];

            const loader = new THREE.FontLoader();
            loader.load('./External/three.js/examples/fonts/helvetiker_regular.typeface.json', (font) => {
            const text = textArray[i];
            const textGeo = new THREE.TextBufferGeometry(text, {
                font: font,
                size: 0.1,
                height: 0.05,
                curveSegments: 12,
                bevelEnabled: false,
            });
            const textObj = new THREE.Mesh(textGeo, material);
            
            textMeshArray.push(textObj);

            scene.add(textObj);
            cube.add(emptyObj[i]);
            });
        }
        
        //Camera Setup
        const canvas = document.querySelector('#c');
        const renderer = new THREE.WebGLRenderer({canvas});
        const fov = 75;
        const aspect = 2;  // the canvas default
        const near = 0.1;
        const far = 5;
        const camera = new THREE.PerspectiveCamera(fov, aspect, near, far);
        camera.position.z = 2;

        {
            const color = 0xFFFFFF;
            const intensity = 1;
            const light = new THREE.DirectionalLight(color, intensity);
            light.position.set(-1, 2, 4);
            scene.add(light);
        }

        renderer.render(scene, camera);

        function resizeRendererToDisplaySize(renderer) {
            const canvas = renderer.domElement;
            const width = canvas.clientWidth;
            const height = canvas.clientHeight;
            const needResize = canvas.width !== width || canvas.height !== height;
            if (needResize) {
                renderer.setSize(width, height, false);
            }
            return needResize;
        }

        function render(time) {
            time *= 0.001;

            if (resizeRendererToDisplaySize(renderer)) {
                const canvas = renderer.domElement;
                camera.aspect = canvas.clientWidth / canvas.clientHeight;
                camera.updateProjectionMatrix();
            }

            //TODO:
            //Rotate cube by click/drag on the canvas
            cube.rotation.x = time;
            cube.rotation.y = time;
            var temp = new THREE.Vector3();
            for (let i = 0; i < textMeshArray.length; i++) {
                //console.log("Set Position");
                textMeshArray[i].position.setFromMatrixPosition(cube.children[i].matrixWorld);
                cube.children[i].getWorldPosition(temp);
                temp.x *= 2.0;
                temp.y *= 2.0;
                temp.z *= 2.0;
                textMeshArray[i].lookAt(temp);
                textMeshArray[i].rotation.z = cube.rotation.z;
            }

            renderer.render(scene, camera);

            requestAnimationFrame(render);
        }
        requestAnimationFrame(render);
    }
    main();
</script>

</body>
